# Jalankan dari repo root:
#   docker compose -f deploy/docker/docker-compose.yml --env-file deploy/.env.production up -d --build

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      MCP_LIVE_ENABLED: ${MCP_LIVE_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-wargio_demo}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      AGENT_ENGINE_ID: ${AGENT_ENGINE_ID:-}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      API_INTERNAL_URL: http://api:8000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Host 3010 — hindari bentrok dengan layanan lain di :3000 (mis. hermes-gateway)
      - "127.0.0.1:3010:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
