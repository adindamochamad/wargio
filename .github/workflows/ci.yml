name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt
      - name: Unit tests (tanpa Atlas)
        run: |
          cd backend
          .venv/bin/pytest ../tests/test_health.py ../tests/test_klasifikasi.py \
            ../tests/test_lokalisasi.py ../tests/test_intents_hari2.py::test_health_menampilkan_agent_mode \
            ../tests/test_unit_coverage_hari6.py ../tests/test_fuzzy_produk.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & test
        run: |
          cd frontend
          npm ci
          npm run test
